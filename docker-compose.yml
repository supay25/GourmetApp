version: "3.9"

services:

  mongo:
    image: mongo:latest
    container_name: gourmetapp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: gourmet
      MONGO_INITDB_ROOT_PASSWORD: gourmet123
      MONGO_INITDB_DATABASE: gourmetapp
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: gourmetapp-mongo-ui
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_ADMINUSERNAME: gourmet
      ME_CONFIG_MONGODB_ADMINPASSWORD: gourmet123
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      ME_CONFIG_BASICAUTH: false

volumes:
  mongo_data: